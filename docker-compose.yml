services:
  pipeline:
    build: .
    image: ghcr.io/edgesentry/arktrace:latest
    env_file:
      - path: .env
        required: false
    environment:
      ARKTRACE_REGION: ${PIPELINE_REGION:-singapore}
    volumes:
      - arktrace-data:/root/.arktrace/data
    profiles:
      - pipeline
    entrypoint: []
    command: >
      python scripts/run_pipeline.py
      --region ${PIPELINE_REGION:-singapore}
      --non-interactive
      --seed-dummy

volumes:
  arktrace-data:
