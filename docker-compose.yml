services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mpol-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Downloads the GGUF model on first run; skips if already present in the volume.
  # Set MODEL_NAME to: gemma-4-e4b-it (default, ~2.5 GB) or gemma-4-e2b-it (~1.4 GB)
  # Set HF_TOKEN if the model repo is gated.
  model_init:
    build:
      context: .
      target: downloader
    container_name: mpol-model-init
    volumes:
      - models:/app/models
    environment:
      MODEL_NAME: ${MODEL_NAME:-gemma-4-e4b-it}
      MODEL_DIR: /app/models
      HF_TOKEN: ${HF_TOKEN:-}
    command: ["python", "scripts/download_model.py"]

  # Creates the default bucket on first run
  minio_init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: mpol-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/arktrace
      "

  dashboard:
    build: .
    container_name: mpol-dashboard
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      VALIDATION_METRICS_PATH: data/processed/validation_metrics.json
      ALERT_CONFIDENCE_THRESHOLD: "0.75"
      ALERT_POLL_INTERVAL: "60"
      # S3-compatible object storage (MinIO for local, real S3/R2/GCS in cloud)
      S3_BUCKET: ${S3_BUCKET:-arktrace}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      # Local LLM — defaults to llamacpp with the model downloaded by model_init
      LLM_PROVIDER: ${LLM_PROVIDER:-llamacpp}
      LLAMACPP_MODEL_PATH: ${LLAMACPP_MODEL_PATH:-/app/models/gemma-4-E4B-it-Q4_K_M.gguf}
    volumes:
      - ./data:/app/data   # DuckDB working file stays local
      - models:/app/models  # GGUF model downloaded by model_init
    depends_on:
      minio_init:
        condition: service_completed_successfully
      model_init:
        condition: service_completed_successfully
    command: ["uv", "run", "uvicorn", "src.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "debug"]

  pipeline:
    build: .
    env_file:
      - .env
    environment:
      # S3-compatible object storage
      S3_BUCKET: ${S3_BUCKET:-arktrace}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-minioadmin}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
      AWS_REGION: ${AWS_REGION:-us-east-1}
    volumes:
      - ./data:/app/data   # DuckDB working file stays local
    depends_on:
      minio_init:
        condition: service_completed_successfully
    profiles:
      - pipeline
    command: >
      uv run python scripts/run_pipeline.py
      --region ${PIPELINE_REGION:-singapore}
      --non-interactive
      --seed-dummy
      ${PIPELINE_STREAM_DURATION:+--stream-duration ${PIPELINE_STREAM_DURATION}}

volumes:
  minio_data:
  models:  # GGUF model files — persists across rebuilds
