site_name: arktrace
site_description: Maritime Pattern of Life analysis pipeline for shadow fleet candidate screening.
site_url: https://edgesentry.github.io/arktrace/
repo_url: https://github.com/edgesentry/arktrace
repo_name: edgesentry/arktrace
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Requirements:
    - Background: background.md
    - Roadmap: roadmap.md
  - Design:
    - Architecture: architecture.md
    - Technical Solution: technical-solution.md
    - Analytics Overview: analytics-overview.md
    - Feature Engineering: feature-engineering.md
    - Scoring Model: scoring-model.md
    - Scenarios: scenarios.md
    - Triage Governance: triage-governance.md
    - Field Investigation: field-investigation.md
  - Implementation:
    - Development Guide: development.md
    - Local E2E Test: local-e2e-test.md
    - Local LLM Setup: local-llm-setup.md
  - Operations:
    - Pipeline Catalog (Operations View): pipeline-catalog.md
    - Pipeline Operations: pipeline-operations.md
    - Custom Feed Integration: custom-feeds.md
    - Regional Playbooks: regional-playbooks.md
    - Backtesting Validation: backtesting-validation.md
    - Pre-Label Governance: prelabel-governance.md
    - Backtracking Runbook: backtracking-runbook.md
    - Causal Analysis: causal-analysis.md
    - Deployment: deployment.md
    - R2 Data Layout: r2-data-layout.md
