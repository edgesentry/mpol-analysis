site_name: arktrace
site_description: Maritime Pattern of Life analysis pipeline for shadow fleet candidate screening.
site_url: https://edgesentry.github.io/arktrace/
repo_url: https://github.com/edgesentry/arktrace
repo_name: edgesentry/arktrace
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonition

nav:
  - Home: index.md
  - Context & Roadmap:
    - Background: ref-background.md
    - Roadmap Overview: roadmap/index.md
    - Core Pipeline Milestones: roadmap/core-pipeline.md
  - Architecture & Reference:
    - Architecture: ref-architecture.md
    - Scoring & Algorithms: ref-technical-solution.md
    - LLM Anti-Hallucination: ref-llm-grounding.md
    - Investigation Test Cases: ref-investigation-test-cases.md
  - Features & Integration:
    - Use Case Scenarios: feature-scenarios.md
    - User Personas & UX: ui-personas.md
    - Custom Feed Integration: integration-custom-feeds.md
  - indago (OSINT data layer):
    - "→ Feature Engineering": https://edgesentry.github.io/indago/feature-engineering/
    - "→ Scoring Model": https://edgesentry.github.io/indago/scoring-model/
    - "→ Pipeline Operations": https://edgesentry.github.io/indago/pipeline-operations/
    - "→ Regional Playbooks": https://edgesentry.github.io/indago/regional-playbooks/
    - "→ R2 Data Layout": https://edgesentry.github.io/indago/r2-data-layout/
    - "→ Backtesting Validation": https://edgesentry.github.io/indago/backtesting-validation/
    - "→ Causal Analysis": https://edgesentry.github.io/indago/causal-analysis/
