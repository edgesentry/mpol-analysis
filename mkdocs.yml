site_name: capvista-mpol-analysis
site_description: Maritime Pattern of Life analysis pipeline for shadow fleet candidate screening.
site_url: https://edgesentry.github.io/capvista-mpol-analysis/
repo_url: https://github.com/edgesentry/capvista-mpol-analysis
repo_name: edgesentry/capvista-mpol-analysis
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Background: background.md
  - Architecture: architecture.md
  - Technical Solution: technical-solution.md
  - Scenarios: scenarios.md
  - Roadmap: roadmap.md
  - Field Investigation: field-investigation.md
  - Local E2E Test: local-e2e-test.md
  - Deployment: deployment.md
  - Regional Playbooks: regional-playbooks.md
