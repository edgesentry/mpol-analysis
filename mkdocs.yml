site_name: arktrace
site_description: Maritime Pattern of Life analysis pipeline for shadow fleet candidate screening.
site_url: https://edgesentry.github.io/arktrace/
repo_url: https://github.com/edgesentry/arktrace
repo_name: edgesentry/arktrace
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Requirements:
    - Background: background.md
    - Roadmap: roadmap.md
  - Design:
    - Architecture: architecture.md
    - Technical Solution: technical-solution.md
    - Scenarios: scenarios.md
    - User Personas & UX: user-personas-ux-analysis.md
  - Implementation:
    - Development Guide: development.md
    - Local E2E Test: local-e2e-test.md
    - Local LLM Setup: local-llm-setup.md
    - LLM Grounding: llm-grounding.md
    - Demo Data: demo-data.md
    - Custom Feed Integration: custom-feeds.md
  - Operations:
    - Deployment: deployment.md
  - indago (OSINT data layer):
    - "→ Feature Engineering": https://edgesentry.github.io/indago/feature-engineering/
    - "→ Scoring Model": https://edgesentry.github.io/indago/scoring-model/
    - "→ Pipeline Operations": https://edgesentry.github.io/indago/pipeline-operations/
    - "→ Regional Playbooks": https://edgesentry.github.io/indago/regional-playbooks/
    - "→ R2 Data Layout": https://edgesentry.github.io/indago/r2-data-layout/
    - "→ Backtesting Validation": https://edgesentry.github.io/indago/backtesting-validation/
    - "→ Causal Analysis": https://edgesentry.github.io/indago/causal-analysis/
