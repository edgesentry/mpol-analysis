name: Public Backtest Integration

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: public-backtest-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest:
    name: Public backtest batch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Run public-data backtest integration batch
        run: |
          uv run python scripts/run_public_backtest_batch.py \
            --regions singapore,japan,middleeast,europe,gulf \
            --gdelt-days 14 \
            --stream-duration 0 \
            --seed-dummy \
            --max-known-cases 200 \
            --min-known-cases 30 \
            --strict-known-cases

      - name: Upload public-backtest artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: public-backtest-integration
          path: |
            data/processed/public_eval_metadata.json
            data/processed/evaluation_manifest_public_integration.json
            data/processed/backtest_report_public_integration.json
            data/processed/backtest_public_integration_summary.json
            data/processed/eval_labels_public_*_integration.csv
          if-no-files-found: warn
