name: Publish data to R2

# Canonical workflow that rescores all active streaming regions, validates
# watchlists, runs the public backtest, and publishes results to R2.
#
# Triggers:
#   - Daily schedule (01:00 UTC) — keeps watchlists and artifacts fresh
#   - Automatically after Public Backtest Integration completes on main
#   - Manual dispatch

on:
  schedule:
    - cron: '0 1 * * *'   # daily 01:00 UTC
  workflow_dispatch:
  workflow_run:
    workflows: ["Public Backtest Integration"]
    branches: ["main"]
    types: [completed]

permissions: {}

concurrency:
  group: data-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Run pipeline & push to R2
    # Skip automatic runs if the upstream workflow failed
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # All pipeline tools resolve data paths via ARKTRACE_DATA_DIR.
      # Set once here so pull-ais-dbs, run_pipeline.py, push-watchlists,
      # and push-ais-dbs all use the same directory.
      ARKTRACE_DATA_DIR: data/processed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      # Cache custom feeds by ISO week — feeds change infrequently so a weekly
      # key avoids re-downloading hundreds of MB on every run. On cache miss the
      # pull step below fetches from R2 and the result is saved automatically.
      - name: Set custom feeds cache key
        id: feeds-cache-key
        run: echo "week=$(date +%G-%V)" >> "$GITHUB_OUTPUT"

      - name: Restore custom feeds cache
        id: feeds-cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: _inputs/custom_feeds/
          key: custom-feeds-${{ steps.feeds-cache-key.outputs.week }}

      # Pull AIS DBs, watchlists, GEBCO masks, and GFW EO parquets in parallel.
      # Custom feeds are pulled separately below (conditional on cache miss).
      # Optional pulls (watchlists, GEBCO, GFW EO) use || true so a missing
      # object does not abort the job — same semantics as the old continue-on-error.
      - name: Pull data from R2 (parallel)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/sync_r2.py pull-ais-dbs \
            --regions japansea,blacksea,middleeast,singapore,europe &
          PID_AIS=$!
          # Download real watchlists produced by a previous pipeline run.
          # Without this step, the backtest has no watchlists to evaluate.
          uv run python scripts/sync_r2.py pull-watchlists &
          PID_WL=$!
          # GEBCO 200m depth masks — used by run_pipeline.py for STS filtering.
          uv run python scripts/sync_r2.py pull-gebco-masks &
          PID_GB=$!
          # GFW EO parquets from the weekly gfw-ingest.yml job.
          uv run python scripts/sync_r2.py pull-gfw-eo &
          PID_GFW=$!
          wait $PID_WL  || echo "::warning::pull-watchlists skipped or failed (non-fatal)"
          wait $PID_GB  || echo "::warning::pull-gebco-masks skipped or failed (non-fatal)"
          wait $PID_GFW || echo "::warning::pull-gfw-eo skipped or failed (non-fatal)"
          wait $PID_AIS  # required — fail the step if AIS DBs cannot be pulled

      # Pull proprietary feed files only when the weekly cache is cold.
      # Skips gracefully when credentials are absent (forks).
      - name: Pull custom feeds from R2
        if: steps.feeds-cache.outputs.cache-hit != 'true'
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: uv run python scripts/sync_r2.py pull-custom-feeds

      # Run all five region pipelines concurrently. Each region writes to its own
      # data/processed/{region}_*.{duckdb,parquet} files with no shared state,
      # so parallel execution is safe. Europe (the largest region) sets the wall-
      # clock ceiling; the four smaller regions complete inside that window.
      - name: Run pipelines (parallel)
        run: |
          uv run python scripts/run_pipeline.py --region japan      --non-interactive &
          PID_JP=$!
          uv run python scripts/run_pipeline.py --region blacksea   --non-interactive &
          PID_BS=$!
          uv run python scripts/run_pipeline.py --region middleeast --non-interactive &
          PID_ME=$!
          uv run python scripts/run_pipeline.py --region singapore  --non-interactive &
          PID_SG=$!
          uv run python scripts/run_pipeline.py --region europe     --non-interactive &
          PID_EU=$!
          fail=0
          wait $PID_JP || { echo "::error::pipeline failed: japan";      fail=1; }
          wait $PID_BS || { echo "::error::pipeline failed: blacksea";   fail=1; }
          wait $PID_ME || { echo "::error::pipeline failed: middleeast"; fail=1; }
          wait $PID_SG || { echo "::error::pipeline failed: singapore";  fail=1; }
          wait $PID_EU || { echo "::error::pipeline failed: europe";     fail=1; }
          exit $fail

      # Run backtest against the pulled watchlists.
      # --skip-pipeline: watchlists are pre-pulled from R2 above; CI has no live
      #   AIS data so running the pipeline here would produce only ~10 seeded
      #   dummy vessels — below --min-watchlist-size=100 — and all regions skip.
      # --seed-dummy: still passed so the dummy MMSI filter logic is consistent.
      - name: Run backtest (skip pipeline, use pulled watchlists)
        run: |
          uv run python scripts/run_public_backtest_batch.py \
            --regions singapore,japan,europe,blacksea,middleeast \
            --gdelt-days 14 \
            --seed-dummy \
            --skip-pipeline \
            --max-known-cases 200 \
            --min-known-cases 5

      - name: Push artifacts to R2
        id: push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/sync_r2.py push 2>&1 | tee /tmp/push.log
          snapshot_id=$(grep -oP '\d{8}T\d{6}Z(?=\.zip pushed)' /tmp/push.log || echo "")
          snapshot_mb=$(grep -oP '[\d.]+(?= MB\.$)' /tmp/push.log | tail -1 || echo "")
          echo "snapshot_id=$snapshot_id" >> "$GITHUB_OUTPUT"
          echo "snapshot_mb=$snapshot_mb" >> "$GITHUB_OUTPUT"

      - name: Seed demo files for push-demo
        # Ensures all _DEMO_FILES exist in ARKTRACE_DATA_DIR (data/processed in CI)
        # so push-demo can find them. Generates empty-schema fallbacks for files
        # that the pipeline doesn't produce in --skip-pipeline mode.
        run: |
          uv run python - <<'EOF'
          import json, os, shutil
          from pathlib import Path
          import polars as pl

          demo_dir = Path(os.environ.get("ARKTRACE_DATA_DIR", str(Path.home() / ".arktrace" / "data")))
          demo_dir.mkdir(parents=True, exist_ok=True)
          processed = demo_dir

          # candidate_watchlist.parquet — primary demo file; must exist in demo_dir.
          # The backtest writes it to data/processed/; copy it across.
          src = processed / "candidate_watchlist.parquet"
          if not src.exists():
              src = demo_dir / "candidate_watchlist.parquet"
          dst_w = demo_dir / "candidate_watchlist.parquet"
          if src.exists() and src != dst_w and not dst_w.exists():
              shutil.copy2(src, dst_w)
              print(f"  candidate_watchlist.parquet ← {src}")
          elif not dst_w.exists():
              # Pipeline produced no candidates — write an empty but schema-valid
              # parquet so push-demo validation passes.
              df = pl.DataFrame(schema={
                  "mmsi": pl.Utf8, "imo": pl.Utf8, "vessel_name": pl.Utf8,
                  "vessel_type": pl.Utf8, "confidence": pl.Float64,
              })
              df.write_parquet(dst_w)
              print("  candidate_watchlist.parquet ← empty schema (pipeline produced no candidates)")

          # composite_scores.parquet — use candidate_watchlist as source.
          dst = demo_dir / "composite_scores.parquet"
          if src.exists() and not dst.exists():
              shutil.copy2(src, dst)
              print(f"  composite_scores.parquet ← {src}")

          # causal_effects.parquet — empty schema if missing
          dst_c = demo_dir / "causal_effects.parquet"
          if not dst_c.exists():
              df = pl.DataFrame(schema={
                  "regime": pl.Utf8, "label": pl.Utf8,
                  "n_treated": pl.Int32, "n_control": pl.Int32,
                  "att_estimate": pl.Float64, "att_ci_lower": pl.Float64,
                  "att_ci_upper": pl.Float64, "p_value": pl.Float64,
                  "is_significant": pl.Boolean, "calibrated_weight": pl.Float64,
              })
              df.write_parquet(dst_c)
              print("  causal_effects.parquet ← empty schema (no full pipeline in CI)")

          # score_history.parquet — 30-day rolling confidence history per vessel
          dst_sh = demo_dir / "score_history.parquet"
          if not dst_sh.exists():
              import random
              from datetime import date, timedelta
              watchlist_path = demo_dir / "candidate_watchlist.parquet"
              if watchlist_path.exists():
                  wl = pl.read_parquet(watchlist_path, columns=["mmsi", "confidence"])
                  rng = random.Random(42)
                  anchor = date.today()
                  days = 30
                  rows = []
                  for mmsi, base_conf in zip(wl["mmsi"].to_list(), wl["confidence"].to_list()):
                      conf = float(base_conf)
                      for d in range(days):
                          score_date = (anchor - timedelta(days=days - 1 - d)).isoformat()
                          conf = max(0.1, min(0.99, conf + rng.uniform(-0.04, 0.04)))
                          rows.append({"mmsi": mmsi, "score_date": score_date, "confidence": round(conf, 4)})
                  sh = pl.DataFrame(rows).with_columns(pl.col("confidence").cast(pl.Float32))
                  sh.write_parquet(dst_sh)
                  print(f"  score_history.parquet ← generated ({len(sh)} rows)")
              else:
                  pl.DataFrame(schema={"mmsi": pl.Utf8, "score_date": pl.Utf8, "confidence": pl.Float32}).write_parquet(dst_sh)
                  print("  score_history.parquet ← empty schema (no watchlist)")

          # validation_metrics.json — derive from backtest report if missing
          dst_m = demo_dir / "validation_metrics.json"
          if not dst_m.exists():
              report_path = processed / "backtest_report_public_integration.json"
              metrics = {}
              if report_path.exists():
                  report = json.loads(report_path.read_text())
                  s = report.get("summary", {})
                  metrics = {
                      "auroc": s.get("auroc"),
                      "precision_at_50": s.get("precision_at_50"),
                      "recall_at_200": s.get("recall_at_200"),
                      "recall_at_25": s.get("recall_at_25"),
                      "false_negatives": s.get("false_negatives"),
                      "calibration_error": s.get("calibration_error"),
                  }
              dst_m.write_text(json.dumps(metrics, indent=2))
              print(f"  validation_metrics.json ← {metrics}")

          print("Seed demo files complete.")
          EOF

      - name: Push demo bundle to R2 (public, no-auth download)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          # Overwrites demo.zip with the latest pipeline outputs so developers can
          # run `pull-demo` (or fetch_demo_data.sh) without any credentials.
          uv run python scripts/sync_r2.py push-demo

      - name: Checkpoint DuckLake catalog and push to R2
        # Reads pipeline output Parquet files, writes them into a DuckLake catalog,
        # checkpoints to materialise clean Parquet files, then pushes:
        #   - arktrace-public/catalog.duckdb + data/...   (public, no-auth)
        #   - arktrace-private-capvista/outputs/...        (authenticated Cap Vista)
        # Runs continue-on-error so a DuckLake failure does not block the existing
        # push step that already uploaded the snapshot zip.
        # Phase 1 gate: if this step fails, check the logs before proceeding to
        # Phase 2 browser code (see arktrace#302).
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/checkpoint_ducklake.py \
            --push-public \
            --push-private \
            --verbose

      - name: Push OpenSanctions DB to R2 (push-sanctions-db)
        # public_eval.duckdb is only written when the full pipeline runs (not
        # --skip-pipeline). Skip gracefully when the file is absent so CI-only
        # runs (no live AIS data) don't fail the whole workflow.
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          # --force ensures the DB is always refreshed after run_public_backtest_batch.py
          # regenerates it (which happens on every run).
          # --data-dir points to data/processed where the backtest writes public_eval.duckdb
          # (default is ~/.arktrace/data which is not where the backtest outputs it).
          uv run python scripts/sync_r2.py push-sanctions-db --force \
            --data-dir data/processed

      - name: Push updated watchlists to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: uv run python scripts/sync_r2.py push-watchlists

      - name: Back up updated AIS DBs to private R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/sync_r2.py push-ais-dbs \
            --regions japansea,blacksea,middleeast,singapore,europe \
            --min-rows 1000

      - name: Lead time validation (#268)
        run: |
          uv run python scripts/validate_lead_time_ofac.py \
            --all-regions \
            --out data/processed/lead_time_report.json

      - name: Send metrics email (#210)
        if: always()
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPSHOT_ID: ${{ steps.push.outputs.snapshot_id }}
          SNAPSHOT_SIZE_MB: ${{ steps.push.outputs.snapshot_mb }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/notify_metrics.py

      - name: Upload artifacts (fallback — available even if R2 push fails)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            data/processed/*.parquet
            data/processed/*.duckdb
            data/processed/*.json
          if-no-files-found: warn
          retention-days: 7
