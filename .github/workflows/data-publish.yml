name: Publish data to R2

# Thin shim retained for the Monday 02:00 UTC schedule and manual dispatch.
# All pipeline steps live in daily-pipeline.yml (the canonical definition);
# this file calls it so both triggers execute the same job sequence — resolving
# the trigger asymmetry and job divergence described in arktrace#459.
#
# Triggers:
#   - Weekly schedule (every Monday 02:00 UTC) — kept for explicit publish cadence
#   - Manual dispatch — run on demand after a data update

on:
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: data-publish
  cancel-in-progress: true

jobs:
  publish:
    uses: ./.github/workflows/daily-pipeline.yml
    secrets: inherit
