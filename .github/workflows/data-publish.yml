name: Publish data to R2

# Runs the full multi-region pipeline on public data (no external API keys
# required) and pushes the resulting artifacts to Cloudflare R2.
#
# Users can then pull the latest dataset with:
#   uv run python scripts/sync_r2.py pull
#
# Triggers:
#   - Weekly schedule (every Monday 02:00 UTC) — keeps data fresh (#209)
#   - Manual dispatch (workflow_dispatch) — run on demand after a data update
#   - Automatically after public-backtest-integration completes on main

on:
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  workflow_dispatch:
  workflow_run:
    workflows: ["Public Backtest Integration"]
    branches: ["main"]
    types: [completed]

permissions: {}

concurrency:
  group: data-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Run pipeline & push to R2
    # Skip automatic runs if the upstream workflow failed
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      # Run the pipeline for all five regions using public data only.
      # --stream-duration 0  skips live AIS ingestion (uses seeded demo data)
      # --seed-dummy         seeds synthetic vessel records for scoring
      # This mirrors what public-backtest-integration does so no external keys
      # are needed.
      - name: Run multi-region pipeline (public data)
        run: |
          uv run python scripts/run_public_backtest_batch.py \
            --regions singapore,japan,middleeast,europe,gulf \
            --gdelt-days 14 \
            --stream-duration 0 \
            --seed-dummy \
            --max-known-cases 200 \
            --min-known-cases 30 \
            --strict-known-cases

      - name: Push artifacts to R2
        id: push
        env:
          S3_BUCKET: ${{ secrets.R2_BUCKET }}
          S3_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/sync_r2.py push 2>&1 | tee /tmp/push.log
          snapshot_id=$(grep -oP '\d{8}T\d{6}Z(?=\.zip pushed)' /tmp/push.log || echo "")
          snapshot_mb=$(grep -oP '[\d.]+(?= MB\.$)' /tmp/push.log | tail -1 || echo "")
          echo "snapshot_id=$snapshot_id" >> "$GITHUB_OUTPUT"
          echo "snapshot_mb=$snapshot_mb" >> "$GITHUB_OUTPUT"

      - name: Send metrics email (#210)
        if: always() && secrets.NOTIFY_EMAIL != ''
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPSHOT_ID: ${{ steps.push.outputs.snapshot_id }}
          SNAPSHOT_SIZE_MB: ${{ steps.push.outputs.snapshot_mb }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/notify_metrics.py

      - name: Upload artifacts (fallback — available even if R2 push fails)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            data/processed/*.parquet
            data/processed/*.duckdb
            data/processed/*.json
          if-no-files-found: warn
          retention-days: 7
