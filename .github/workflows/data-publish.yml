name: Publish data to R2

# Runs the full multi-region pipeline on public data (no external API keys
# required) and pushes the resulting artifacts to Cloudflare R2.
#
# Users can then pull the latest dataset with:
#   uv run python scripts/sync_r2.py pull
#
# Triggers:
#   - Weekly schedule (every Monday 02:00 UTC) — keeps data fresh (#209)
#   - Manual dispatch (workflow_dispatch) — run on demand after a data update
#   - Automatically after public-backtest-integration completes on main

on:
  schedule:
    - cron: '0 2 * * 1'   # every Monday 02:00 UTC
  workflow_dispatch:
  workflow_run:
    workflows: ["Public Backtest Integration"]
    branches: ["main"]
    types: [completed]

permissions: {}

concurrency:
  group: data-publish
  cancel-in-progress: true

jobs:
  publish:
    name: Run pipeline & push to R2
    # Skip automatic runs if the upstream workflow failed
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'schedule' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      # Pull real watchlists from R2 (uploaded after a local dev pipeline run via
      # `sync_r2.py push-watchlists`). These are tiny (< 1 MB total) and avoid
      # re-running live AIS streaming in CI.  Continue on error so the job does
      # not fail hard when no watchlists have been pushed yet — the backtest will
      # simply skip all regions and the email guard in notify_metrics.py will
      # suppress the all-zeros notification.
      - name: Pull watchlists from R2
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: uv run python scripts/sync_r2.py pull-watchlists

      # Run the backtest against pre-pulled watchlists.  --skip-pipeline bypasses
      # the seeded AIS pipeline so we evaluate real data.  --strict-known-cases is
      # omitted; if R2 has no watchlists yet the job finishes cleanly with 0 cases.
      - name: Run backtest (skip pipeline — use R2 watchlists)
        run: |
          uv run python scripts/run_public_backtest_batch.py \
            --regions singapore,japan,middleeast,europe,gulf \
            --gdelt-days 14 \
            --skip-pipeline \
            --max-known-cases 200 \
            --min-known-cases 30

      - name: Push artifacts to R2
        id: push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          uv run python scripts/sync_r2.py push 2>&1 | tee /tmp/push.log
          snapshot_id=$(grep -oP '\d{8}T\d{6}Z(?=\.zip pushed)' /tmp/push.log || echo "")
          snapshot_mb=$(grep -oP '[\d.]+(?= MB\.$)' /tmp/push.log | tail -1 || echo "")
          echo "snapshot_id=$snapshot_id" >> "$GITHUB_OUTPUT"
          echo "snapshot_mb=$snapshot_mb" >> "$GITHUB_OUTPUT"

      - name: Seed demo files for push-demo
        # push-demo reads from ~/.arktrace/data/; the backtest writes outputs to
        # data/processed/.  Copy/generate the three required demo files so
        # push-demo can find them regardless of whether the full pipeline ran.
        run: |
          uv run python - <<'EOF'
          import json, shutil
          from pathlib import Path
          import polars as pl

          demo_dir = Path.home() / ".arktrace" / "data"
          demo_dir.mkdir(parents=True, exist_ok=True)
          processed = Path("data/processed")

          # composite_scores.parquet — use candidate_watchlist if available
          src = processed / "candidate_watchlist.parquet"
          dst = demo_dir / "composite_scores.parquet"
          if src.exists() and not dst.exists():
              shutil.copy2(src, dst)
              print(f"  composite_scores.parquet ← {src}")

          # causal_effects.parquet — empty schema if missing
          dst_c = demo_dir / "causal_effects.parquet"
          if not dst_c.exists():
              df = pl.DataFrame(schema={
                  "regime": pl.Utf8, "label": pl.Utf8,
                  "n_treated": pl.Int32, "n_control": pl.Int32,
                  "att_estimate": pl.Float64, "att_ci_lower": pl.Float64,
                  "att_ci_upper": pl.Float64, "p_value": pl.Float64,
                  "is_significant": pl.Boolean, "calibrated_weight": pl.Float64,
              })
              df.write_parquet(dst_c)
              print("  causal_effects.parquet ← empty schema (no full pipeline in CI)")

          # validation_metrics.json — derive from backtest report if missing
          dst_m = demo_dir / "validation_metrics.json"
          if not dst_m.exists():
              report_path = processed / "backtest_report_public_integration.json"
              metrics = {}
              if report_path.exists():
                  report = json.loads(report_path.read_text())
                  s = report.get("summary", {})
                  metrics = {
                      "auroc": s.get("auroc"),
                      "precision_at_50": s.get("precision_at_50"),
                      "recall_at_200": s.get("recall_at_200"),
                      "recall_at_25": s.get("recall_at_25"),
                      "false_negatives": s.get("false_negatives"),
                      "calibration_error": s.get("calibration_error"),
                  }
              dst_m.write_text(json.dumps(metrics, indent=2))
              print(f"  validation_metrics.json ← {metrics}")

          print("Seed demo files complete.")
          EOF

      - name: Push demo bundle to R2 (public, no-auth download)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          # Overwrites demo.zip with the latest pipeline outputs so developers can
          # run `pull-demo` (or fetch_demo_data.sh) without any credentials.
          uv run python scripts/sync_r2.py push-demo

      - name: Push OpenSanctions DB to R2 (push-sanctions-db)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: |
          # --force ensures the DB is always refreshed after run_public_backtest_batch.py
          # regenerates it (which happens on every data-publish run).
          uv run python scripts/sync_r2.py push-sanctions-db --force

      - name: Lead time validation (#268)
        continue-on-error: true
        run: |
          uv run python scripts/validate_lead_time_ofac.py \
            --all-regions \
            --out data/processed/lead_time_report.json

      - name: Send metrics email (#210)
        if: always()
        env:
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SNAPSHOT_ID: ${{ steps.push.outputs.snapshot_id }}
          SNAPSHOT_SIZE_MB: ${{ steps.push.outputs.snapshot_mb }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: uv run python scripts/notify_metrics.py

      - name: Upload artifacts (fallback — available even if R2 push fails)
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: pipeline-artifacts-${{ github.run_id }}
          path: |
            data/processed/*.parquet
            data/processed/*.duckdb
            data/processed/*.json
          if-no-files-found: warn
          retention-days: 7
