name: Merge reviews

on:
  # Disabled — re-enable schedule once review intake is open (see arktrace#547)
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: merge-reviews
  cancel-in-progress: true

jobs:
  merge:
    name: merge-reviews
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Merge per-user reviews into R2
        run: uv run python scripts/sync_r2.py merge-reviews
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION:            auto
          S3_ENDPOINT:           https://b8a0b09feb89390fb6e8cf4ef9294f48.r2.cloudflarestorage.com
