name: Publish Docker image

# Builds and pushes the arktrace image to GHCR on every push to main
# and on release tags (v*).  Produces a multi-arch image:
#   linux/amd64  — x86-64 servers and most cloud VMs
#   linux/arm64  — AWS Graviton, Apple Silicon Docker, Raspberry Pi

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build & push multi-arch image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up QEMU (cross-arch emulation)
        uses: docker/setup-qemu-action@29109295f81e9208c5be14e99b5399e7a6c2945e  # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5730b3e8af6b8ce95db3ebe376b8b2f9df3e50b  # v3

      - name: Log in to GHCR
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772  # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbea8a63f6f14d2a33b61bfd44b1  # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@14487ce63c7a62a4a324b0c83e9c2f2d71a6e09f  # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
