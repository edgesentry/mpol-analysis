name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies (including dev)
        run: uv sync --all-extras --group dev

      - name: Run tests
        run: uv run --group dev python -m pytest tests/ -v

  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dev dependencies
        run: uv sync --all-extras --group dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy pipeline/src/

  docker_build:
    name: Docker build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          context: .
          push: false
          tags: arktrace:${{ github.sha }}
          # Layer cache stored in GitHub Actions Cache (10 GB limit per repo).
          # When pyproject.toml/uv.lock are unchanged the uv sync layer
          # (including compiled lance-graph Rust code) is restored from cache.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  score_regression_gate:
    name: Score regression gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only run on PRs targeting main; skip on direct pushes to main (covered by
    # public-backtest-integration.yml which runs the full multi-region batch).
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Pull public_eval.duckdb from R2
        # Skip gracefully when R2 credentials are absent (e.g. forks).
        # The backtest will still run using a freshly downloaded OpenSanctions
        # JSONL if the DB is missing; if both are absent, --min-known-cases 5
        # will cause the batch to surface a clear error rather than silently pass.
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          if [ -z "$R2_ACCOUNT_ID" ]; then
            echo "[skip] R2 credentials absent — skipping pull-sanctions-db"
          else
            uv run python pipeline/scripts/sync_r2.py pull-sanctions-db
          fi

      - name: Run Singapore pipeline (seed mode)
        run: |
          uv run python pipeline/scripts/run_pipeline.py \
            --region singapore \
            --non-interactive \
            --seed-dummy

      - name: Run public backtest
        env:
          # Pipeline wrote watchlists to data/processed/ (not ~/.arktrace/data/).
          # DATA_DIR tells run_public_backtest_batch where to find them.
          DATA_DIR: data/processed
        run: |
          uv run python pipeline/scripts/run_public_backtest_batch.py \
            --regions singapore \
            --seed-dummy \
            --min-known-cases 5 \
            --min-watchlist-size 10

      - name: Assert score regression bounds
        id: regression_check
        shell: bash
        run: |
          set -o pipefail
          uv run python pipeline/scripts/check_score_regression.py \
            --summary data/processed/backtest_public_integration_summary.json \
            --report  data/processed/backtest_report_public_integration.json \
            | tee /tmp/regression_check_output.txt

      - name: Upload regression check artefacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4
        with:
          name: score-regression-gate-${{ github.sha }}
          path: |
            data/processed/backtest_public_integration_summary.json
            data/processed/backtest_report_public_integration.json
          if-no-files-found: warn

  demo_artifacts:
    name: Demo score output
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # Only on PRs; skip direct pushes to main (same as score_regression_gate).
    # Skips gracefully when private R2 credentials are absent (forks).
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras --group dev

      - name: Pull custom feeds from arktrace-private-capvista
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          uv run python pipeline/scripts/sync_r2.py pull-custom-feeds
          if [ -z "$(ls _inputs/custom_feeds/*.csv 2>/dev/null)" ]; then
            echo "[skip] no custom feed files pulled — skipping demo job"
            exit 0
          fi

      - name: Run Singapore pipeline (real scoring, custom feeds only)
        # No --seed-dummy: scores are computed from the custom feed data alone.
        # The pipeline ingests ais_capvista_demo.csv and sanctions_capvista_demo.csv
        # from _inputs/custom_feeds/ and runs the full real scoring algorithm.
        env:
          DATA_DIR: data/processed
        run: |
          uv run python pipeline/scripts/run_pipeline.py \
            --region singapore \
            --non-interactive

      - name: Upload demo artefacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808  # v4
        with:
          name: demo-artifacts-${{ github.sha }}
          path: |
            data/processed/singapore_watchlist.parquet
            data/processed/composite_scores.parquet
            data/processed/validation_metrics.json
          if-no-files-found: warn

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies (including dev for pip-licenses)
        run: uv sync --all-extras --group dev

      - name: Check licenses (deny copyleft)
        # Fail if any installed package carries a copyleft license.
        # Permissive licenses (MIT, Apache-2.0, BSD-*, ISC, PSF) are allowed.
        run: |
          uv run pip-licenses --format=csv > /tmp/licenses.csv
          python3 - <<'EOF'
          import csv, sys

          BLOCKED = [
              "gpl",
              "agpl",
              "lgpl",
              "affero",
              "eupl",
              "gnu general public",
              "gnu lesser general",
              "copyleft",
          ]

          violations = []
          with open("/tmp/licenses.csv") as f:
              for row in csv.DictReader(f):
                  name = row.get("Name", "")
                  version = row.get("Version", "")
                  license_str = (row.get("License") or "").lower()
                  if any(p in license_str for p in BLOCKED):
                      violations.append(f"  {name} {version}: {row.get('License')}")

          if violations:
              print("Copyleft licenses detected — not permitted in this project:")
              print("\n".join(violations))
              sys.exit(1)

          print("License check passed — all packages use permissive licenses.")
          EOF

      - name: Print full license report
        if: always()
        run: uv run pip-licenses --format=plain
