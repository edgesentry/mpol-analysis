# docker-compose.infra.yml
#
# Starts only the infrastructure services (MinIO) needed for local development.
# Use this together with scripts/run_dev.sh to run the dashboard natively on
# macOS and get Apple Metal / ANE acceleration for local LLM inference.
#
# Usage:
#   docker compose -f docker-compose.infra.yml up -d
#
# Or via the helper script (recommended):
#   bash scripts/run_dev.sh

services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: mpol-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio_init:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    container_name: mpol-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/arktrace
      "

volumes:
  minio_data:
